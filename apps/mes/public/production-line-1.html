<!-- 생산 라인 1 — Tank1Click 팝업 x-template (레이아웃은 HMI 캔버스가 담당) -->

<style>
  .tank1-popup {
    position: fixed; z-index: 9999; min-width: 220px;
    background: #2a2a3a; border: 1px solid #555; border-radius: 8px;
    padding: 24px 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    color: #fff; font-family: sans-serif; text-align: center;
  }
  .tank1-popup-title { font-size: 14px; color: #aaa; margin-bottom: 12px; }
  .tank1-popup-level { font-size: 22px; font-weight: bold; margin-bottom: 20px; }
  .tank1-popup-close {
    padding: 6px 20px; background: #555; border: none;
    border-radius: 4px; color: #fff; cursor: pointer; font-size: 13px;
  }
  .tank1-popup-close:hover { background: #777; }
</style>

<script type="text/x-template" id="tpl-tank1-popup">
  <div id="__tank1-popup" class="tank1-popup">
    <div class="tank1-popup-title">{%=o.label%}</div>
    <div class="tank1-popup-level">탱크레벨: {%=o.level%}</div>
    <button type="button" class="tank1-popup-close">닫기</button>
  </div>
</script>
