<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HMI Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2a; color: #ccc; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

    /* ── 툴바 ── */
    #toolbar {
      height: 42px; background: #12121e; border-bottom: 1px solid #333;
      display: flex; align-items: center; gap: 6px; padding: 0 12px; flex-shrink: 0;
    }
    #toolbar .logo { color: #88aaff; font-weight: bold; font-size: 14px; margin-right: 4px; }
    #toolbar .sep { width: 1px; height: 20px; background: #444; }
    #file-name-display { color: #888; font-size: 12px; }

    /* ── 메인 영역 ── */
    #main { flex: 1; display: flex; overflow: hidden; }

    /* ── 팔레트 ── */
    #palette-panel {
      width: 140px; background: #12121e; border-right: 1px solid #333;
      overflow-y: auto; padding: 8px 6px; flex-shrink: 0;
    }
    #palette-panel h3 { color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }
    .palette-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px; margin-bottom: 4px; border-radius: 4px;
      background: #1e1e30; border: 1px solid #333; cursor: grab;
      font-size: 12px; user-select: none;
    }
    .palette-item:hover { border-color: #4a9eff; color: #fff; }
    .palette-icon { font-size: 14px; width: 18px; text-align: center; }

    /* ── 캔버스 영역 ── */
    #editor-canvas-outer {
      flex: 1; position: relative; overflow: hidden;
      background: #111;
      background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    #canvas-scaler { position: absolute; }
    #editor-canvas { position: relative; overflow: hidden; }
    .widget-preview { position: absolute; }
    .widget-preview.selected { outline: 2px solid #4a9eff; outline-offset: 2px; }

    /* ── 선택 핸들 ── */
    #selection-handles { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1000; }
    #selection-handles .resize-handle { pointer-events: all; }

    /* ── 라인 핸들 SVG ── */
    #line-handles-svg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1001; overflow: visible;
    }
    #line-handles-svg .line-endpoint,
    #line-handles-svg .line-waypoint,
    #line-handles-svg .line-body-hit { pointer-events: all; }

    /* ── 오른쪽 패널 ── */
    #right-panel {
      width: 270px; background: #12121e; border-left: 1px solid #333;
      display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
    }

    /* ── 레이어 패널 ── */
    #layer-panel {
      height: 200px; border-bottom: 1px solid #333; overflow-y: auto;
      flex-shrink: 0;
    }
    #layer-panel h3 { color: #888; font-size: 11px; text-transform: uppercase; padding: 8px; background: #0e0e1c; }
    .layer-item {
      display: flex; align-items: center; gap: 4px; padding: 5px 8px;
      border-bottom: 1px solid #222; cursor: pointer; font-size: 12px;
    }
    .layer-item:hover { background: #1e1e30; }
    .layer-item.selected { background: #1a2a4a; }
    .layer-type { color: #888; font-size: 10px; min-width: 50px; }
    .layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .layer-actions { display: flex; gap: 2px; opacity: 0; }
    .layer-item:hover .layer-actions { opacity: 1; }
    .layer-btn {
      background: #2a2a3a; border: 1px solid #444; color: #888;
      border-radius: 2px; width: 20px; height: 20px; cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .layer-btn:hover { border-color: #4a9eff; color: #4a9eff; }

    /* ── 속성/캔버스 패널 ── */
    #property-panel-wrapper, #canvas-settings-panel {
      flex: 1; overflow-y: auto; padding: 0;
    }
    .prop-section { border-bottom: 1px solid #222; padding: 10px 10px 8px; }
    .prop-section-title {
      color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .prop-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .prop-row label { color: #888; font-size: 11px; min-width: 56px; }
    .prop-row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .prop-input {
      flex: 1; background: #1e1e30; border: 1px solid #333; color: #ccc;
      border-radius: 3px; padding: 3px 6px; font-size: 12px;
      min-width: 0;
    }
    .prop-input:focus { border-color: #4a9eff; outline: none; }
    /* 2열 격자 안에서 라벨이 너무 넓어 input을 밀어내지 않도록 */
    .prop-row-2col .prop-row label { min-width: 36px; }
    /* 그리드 아이템이 1fr을 초과해 늘어나지 않도록 */
    .prop-row-2col > * { min-width: 0; }
    /* 패널 자체에서 수평 스크롤 차단 */
    #property-panel-wrapper { overflow-x: hidden; }
    .prop-static { color: #556; font-size: 12px; font-family: monospace; }
    .prop-empty { padding: 20px; color: #444; font-size: 13px; text-align: center; }
    .anim-row { display: flex; gap: 4px; margin-bottom: 4px; align-items: center; }
    .prop-btn-sm {
      background: #2a2a3a; border: 1px solid #444; color: #888; border-radius: 3px;
      padding: 2px 8px; cursor: pointer; font-size: 11px;
    }
    .prop-btn-sm:hover { border-color: #4a9eff; color: #4a9eff; }

    /* ── 툴바 버튼 ── */
    .tb-btn {
      background: #2a2a3a; color: #888; border: 1px solid #444;
      border-radius: 3px; padding: 4px 10px; cursor: pointer; font-size: 12px;
    }
    .tb-btn:hover { border-color: #aaa; color: #ccc; }
    .tb-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── 커스텀 위젯 팔레트 ── */
    .palette-section-sep { height: 1px; background: #333; margin: 6px 0; }
    .palette-section-header {
      display: flex; align-items: center; justify-content: space-between;
      color: #666; font-size: 10px; text-transform: uppercase; padding: 2px 2px 4px;
    }
    .palette-add-btn {
      background: none; border: 1px solid #444; color: #666; border-radius: 3px;
      width: 18px; height: 18px; cursor: pointer; font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .palette-add-btn:hover { border-color: #4a9eff; color: #4a9eff; }
    .custom-palette-item { position: relative; }
    .custom-palette-delete {
      display: none; position: absolute; top: 2px; right: 2px;
      background: #3a1a1a; border: 1px solid #662222; color: #cc4444;
      border-radius: 2px; width: 16px; height: 16px; cursor: pointer; font-size: 10px;
      line-height: 1; align-items: center; justify-content: center; padding: 0;
    }
    .custom-palette-item:hover .custom-palette-delete { display: flex; }
    .custom-palette-thumb {
      width: 18px; height: 18px; object-fit: contain; flex-shrink: 0;
    }

    /* ── 커스텀 위젯 등록 모달 ── */
    #custom-widget-modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 10000;
      align-items: center; justify-content: center;
    }
    #custom-widget-modal-backdrop.open { display: flex; }
    #custom-widget-modal {
      background: #1e1e30; border: 1px solid #444; border-radius: 6px;
      padding: 20px 24px; min-width: 320px; max-width: 420px; width: 90%;
    }
    #custom-widget-modal h3 { color: #ccc; font-size: 14px; margin-bottom: 16px; }
    .modal-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .modal-row label { color: #888; font-size: 12px; min-width: 60px; }
    .modal-input {
      flex: 1; background: #12121e; border: 1px solid #444; color: #ccc;
      border-radius: 3px; padding: 4px 8px; font-size: 12px;
    }
    .modal-input:focus { border-color: #4a9eff; outline: none; }
    #custom-widget-preview-img {
      display: none; max-width: 100%; max-height: 120px; object-fit: contain;
      margin: 4px 0 10px; border: 1px solid #333; border-radius: 3px;
    }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .modal-btn-primary {
      background: #1a3a6a; border: 1px solid #3366aa; color: #88bbff;
      border-radius: 3px; padding: 5px 16px; cursor: pointer; font-size: 12px;
    }
    .modal-btn-primary:hover { background: #1e4080; }
    .modal-btn-cancel {
      background: #2a2a3a; border: 1px solid #444; color: #888;
      border-radius: 3px; padding: 5px 16px; cursor: pointer; font-size: 12px;
    }
    .modal-btn-cancel:hover { border-color: #aaa; color: #ccc; }
    .modal-label-gap { margin-left: 8px; }
  </style>
</head>
<body>

<!-- ── x-template 블록 ── -->
<script type="text/x-template" id="tmpl-palette-item">
  <div class="palette-item" draggable="true" data-type="${type}" title="${label}">
    <span class="palette-icon">${icon}</span>
    <span>${label}</span>
  </div>
</script>

<!-- ── 툴바 ── -->
<div id="toolbar">
  <span class="logo">HMI Editor</span>
  <button id="btn-open" class="tb-btn">열기</button>
  <button id="btn-save" class="tb-btn">저장</button>
  <button id="btn-save-as" class="tb-btn">다른이름...</button>
  <div class="sep"></div>
  <button id="btn-undo" class="tb-btn" disabled>↩ 실행취소</button>
  <button id="btn-redo" class="tb-btn" disabled>↪ 재실행</button>
  <div class="sep"></div>
  <button id="btn-open-viewer" class="tb-btn">🖥 뷰어</button>
  <div class="sep"></div>
  <span id="file-name-display" style="color:#888;font-size:12px;">untitled.json</span>
</div>

<!-- ── 메인 ── -->
<div id="main">

  <!-- 팔레트 -->
  <div id="palette-panel">
    <h3>위젯</h3>
    <div id="widget-palette-list"></div>
  </div>

  <!-- 캔버스 -->
  <div id="editor-canvas-outer">
    <div id="canvas-scaler">
      <div id="editor-canvas">
        <!-- 선택 핸들 -->
        <div id="selection-handles"></div>
        <!-- 라인 핸들 -->
        <svg id="line-handles-svg"></svg>
      </div>
    </div>
  </div>

  <!-- 오른쪽 패널 -->
  <div id="right-panel">

    <!-- 레이어 패널 -->
    <div id="layer-panel">
      <h3>레이어</h3>
      <div id="layer-list"></div>
    </div>

    <!-- 속성 패널 (위젯 선택 시) -->
    <div id="property-panel-wrapper" style="display:none">
      <div id="property-panel"></div>
    </div>

    <!-- 캔버스 설정 패널 (선택 없을 때) -->
    <div id="canvas-settings-panel">
      <div class="prop-section">
        <div class="prop-section-title">캔버스 설정</div>
        <div class="prop-row">
          <select id="canvas-presets" style="width:100%;background:#1e1e30;border:1px solid #333;color:#ccc;border-radius:3px;padding:3px 6px;font-size:12px;"></select>
        </div>
        <div class="prop-row-2col">
          <div class="prop-row"><label>가로</label><input id="canvas-width" type="number" class="prop-input" /></div>
          <div class="prop-row"><label>세로</label><input id="canvas-height" type="number" class="prop-input" /></div>
        </div>
        <div class="prop-row">
          <label>배경색</label>
          <input id="canvas-bg-color" type="color" class="prop-input" style="width:48px;height:28px;padding:0;border:none;cursor:pointer" />
        </div>
        <div class="prop-row"><label>배경 이미지</label>
          <input id="canvas-bg-image" type="text" class="prop-input" placeholder="URL 또는 업로드" />
        </div>
        <div class="prop-row">
          <input id="canvas-bg-upload" type="file" accept="image/*" style="display:none" />
          <button class="prop-btn-sm" onclick="document.getElementById('canvas-bg-upload').click()">이미지 업로드</button>
          <button id="btn-clear-bg" class="prop-btn-sm">제거</button>
        </div>
        <div class="prop-row"><label>맞춤</label>
          <select id="canvas-bg-fit" class="prop-input">
            <option value="cover">cover</option>
            <option value="contain">contain</option>
            <option value="fill">fill</option>
          </select>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ── 커스텀 위젯 등록 모달 ── -->
<div id="custom-widget-modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="custom-widget-modal-title">
  <div id="custom-widget-modal">
    <h3 id="custom-widget-modal-title">커스텀 위젯 등록</h3>

    <div class="modal-row">
      <label for="custom-widget-name">이름</label>
      <input id="custom-widget-name" type="text" class="modal-input" placeholder="영문·숫자 (예: MyPump)" title="위젯 이름" />
    </div>

    <div class="modal-row">
      <label for="custom-widget-image-file">이미지</label>
      <input id="custom-widget-image-file" type="file" class="modal-input" accept=".svg,.png,.jpg,.jpeg" title="SVG, PNG, JPG 파일 선택" />
    </div>

    <img id="custom-widget-preview-img" alt="이미지 미리보기" />

    <div class="modal-row">
      <label for="custom-widget-width">기본 너비</label>
      <input id="custom-widget-width" type="number" class="modal-input" value="120" min="20" max="1000" title="기본 너비(px)" />
      <label for="custom-widget-height" class="modal-label-gap">높이</label>
      <input id="custom-widget-height" type="number" class="modal-input" value="120" min="20" max="1000" title="기본 높이(px)" />
    </div>

    <div class="modal-btns">
      <button type="button" id="btn-custom-widget-cancel" class="modal-btn-cancel">취소</button>
      <button type="button" id="btn-custom-widget-confirm" class="modal-btn-primary">등록</button>
    </div>
  </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
